name: Release (macOS)

# Triggered on tag push (e.g. v0.1.0): builds the macOS installer and publishes it to a GitHub Release.
# Also supports manual triggering from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Write permission is required to create a Release and upload artifacts.
permissions:
  contents: write

jobs:
  build-mac:
    # This project depends on an arm64-only native module (@anthropic-ai/claude-agent-sdk-darwin-arm64),
    # so the build runs on an Apple Silicon runner to produce arm64 artifacts.
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci runs postinstall: prisma generate + electron-builder install-app-deps
      - name: Install dependencies
        run: npm ci

      # Detect whether an Apple Developer ID certificate is configured (secrets can't be used
      # directly in an `if` condition, so read it here and write it as a step output). If it's
      # configured -> real signing + notarization; if not -> ad-hoc signing.
      - name: Detect signing mode
        id: signing
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "mode=developer-id" >> "$GITHUB_OUTPUT"
            echo "::notice::Developer ID certificate detected -> signing + notarization will run"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
            echo "::warning::No Developer ID certificate configured -> falling back to ad-hoc signing (users will need to right-click Open or clear the quarantine attribute)"
          fi

      # Build the renderer + main process (including typecheck), then package and sign with electron-builder.
      # electron-builder automatically imports CSC_LINK (a base64-encoded .p12) into a temporary keychain
      # to sign; when CSC_LINK is absent, signing is skipped and the afterPack hook (build/adhoc-sign.cjs)
      # applies an ad-hoc signature instead.
      - name: Build & package
        env:
          # Code signing certificate (real signing if present, ad-hoc otherwise)
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization credentials (notarytool)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run build
          if [ "${{ steps.signing.outputs.mode }}" = "developer-id" ]; then
            # Override the config's notarize:false to enable notarization; electron-builder staples
            # the ticket automatically once it completes.
            npx electron-builder --mac --arm64 --publish never -c.mac.notarize=true
          else
            npx electron-builder --mac --arm64 --publish never
          fi

      # Generate a SHA256 checksum file so users can verify their download.
      - name: Generate checksums
        working-directory: dist
        run: |
          shopt -s nullglob
          files=(*.dmg *.zip)
          if [ ${#files[@]} -gt 0 ]; then
            shasum -a 256 "${files[@]}" > SHA256SUMS.txt
            cat SHA256SUMS.txt
          fi

      # Upload the build output as a pipeline artifact (kept for both tag and manual triggers, to aid debugging).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
            dist/SHA256SUMS.txt
          if-no-files-found: error

      # Only create/update a GitHub Release and attach artifacts when triggered by a tag.
      # The dmg is for users to download and install; zip/blockmap/latest-mac.yml are for electron-updater's auto-update.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
            dist/SHA256SUMS.txt
