# Mirror a published GitHub Release to the website's S3-compatible storage + CDN. Decoupled downstream
# consumer of release.yml: GitHub Release stays the single source of truth, this job re-publishes its
# installers to a fast, in-country endpoint and writes version.json (website + in-app update prompt).
# Cache correctness is handled purely via Cache-Control headers at upload time (immutable installers,
# no-cache manifest) — no CDN purge API is needed.
name: Mirror to website

on:
  # Auto-run once a Release is published; also runnable by hand to backfill or re-mirror a past tag.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to mirror (e.g. v0.1.2)'
        required: true

# Only needs to read Release assets; it never writes back to the repo.
permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the manifest script)
        uses: actions/checkout@v4

      # Tag from the Release event, or the manual input; version is the tag without a leading 'v'.
      - name: Resolve tag and version
        id: ref
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$tag" ]; then
            echo "No tag resolved from event or input" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      # Pull every installer + SHA256SUMS.txt for the tag. GH_TOKEN authenticates gh with the repo.
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ steps.ref.outputs.tag }}" --repo "${{ github.repository }}" --dir dist-assets

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build version.json from the downloaded files. Missing platforms warn (not fail) inside the
      # script, so a partial release still yields a usable manifest. Notes/date are pulled from the
      # release itself (via gh), not the event payload, so a manual workflow_dispatch backfill gets the
      # real body/date too — not just the release-published event. The script condenses the body to the
      # curated highlights sections.
      - name: Generate version.json
        env:
          DIST_DIR: dist-assets
          OUTPUT: version.json
          VERSION: ${{ steps.ref.outputs.version }}
          CDN_BASE_URL: ${{ vars.CDN_BASE_URL }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ref.outputs.tag }}
        run: |
          NOTES="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq .body)"
          RELEASE_DATE="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json publishedAt --jq .publishedAt)"
          export NOTES RELEASE_DATE
          node scripts/generate-version-manifest.mjs

      # Credentials + region for aws-cli. The region alone lets aws-cli resolve the correct AWS S3
      # endpoint on its own — do NOT pass --endpoint-url: a bucket/website-style endpoint there makes
      # ListObjectsV2 return NoSuchKey and breaks the sync.
      - name: Configure AWS credentials
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
        run: |
          aws configure set aws_access_key_id "$S3_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$S3_SECRET_ACCESS_KEY"
          aws configure set default.region "$S3_REGION"

      # Installers go to an immutable, per-version path: re-running the same tag overwrites identical
      # bytes (idempotent backfill). The immutable Cache-Control lets the CDN/browsers cache these
      # large files forever without any purge. version.json is excluded here and published separately
      # as the one mutable object. Bucket is a secret so it stays masked in the public Actions log, and
      # --only-show-errors suppresses the per-file `upload: ... to s3://...` lines that would leak it.
      - name: Sync installers to versioned path
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
          VERSION: ${{ steps.ref.outputs.version }}
        run: |
          aws s3 sync dist-assets/ \
            "s3://$S3_BUCKET/$S3_PREFIX/releases/$VERSION/" --exclude "version.json" \
            --cache-control "public, max-age=31536000, immutable" --only-show-errors

      # The single mutable manifest, overwritten on every release; website + app read this path. no-cache
      # keeps the CDN/browsers revalidating so a new version is picked up immediately without a purge.
      - name: Upload version.json
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
        run: |
          aws s3 cp version.json \
            "s3://$S3_BUCKET/$S3_PREFIX/version.json" \
            --cache-control "no-cache" --content-type "application/json" --only-show-errors

      # electron-updater feed files (win latest.yml, linux latest-linux.yml, and the per-arch mac
      # feeds arm64-mac.yml / x64-mac.yml) must live at the channel root (a stable url the updater
      # always polls), but the installers + blockmaps they reference live under releases/<version>/.
      # Rewrite each feed's bare `path:`/`url:` filenames to that versioned subpath so the updater
      # resolves them against the channel root. Missing feeds (e.g. a mac-only backfill) are skipped.
      - name: Rewrite update feed paths
        env:
          VERSION: ${{ steps.ref.outputs.version }}
        run: |
          shopt -s nullglob
          for yml in dist-assets/latest.yml dist-assets/latest-linux.yml dist-assets/*-mac.yml; do
            [ -f "$yml" ] || continue
            node -e '
              const fs = require("fs");
              const file = process.argv[1];
              const version = process.env.VERSION;
              const text = fs.readFileSync(file, "utf8").replace(
                /^(\s*(?:- )?(?:path|url):\s*)(?!https?:|releases\/)([^\s].*)$/gm,
                (_m, prefix, name) => `${prefix}releases/${version}/${name}`
              );
              fs.writeFileSync(file, text);
              process.stdout.write(text);
            ' "$yml"
          done

      # Publish the rewritten feeds to the channel root as mutable, no-cache objects (same policy as
      # version.json), so the updater always sees the latest version immediately.
      - name: Upload update feed to channel root
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
        run: |
          shopt -s nullglob
          for yml in dist-assets/latest.yml dist-assets/latest-linux.yml dist-assets/*-mac.yml; do
            [ -f "$yml" ] || continue
            aws s3 cp "$yml" "s3://$S3_BUCKET/$S3_PREFIX/$(basename "$yml")" \
              --cache-control "no-cache" --content-type "text/yaml" --only-show-errors
          done
