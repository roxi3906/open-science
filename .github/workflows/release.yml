name: Release

# Stable release: on a version tag (e.g. v0.1.0) build every platform and publish them to a single
# GitHub Release. Also runnable manually from the Actions tab (builds + uploads artifacts; only a
# tag run creates the Release). Nightly builds live in nightly.yml.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required to create a Release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the platform matrix (macOS arm64/x64 + Linux + Windows x64) via the reusable workflow.
  # secrets: inherit forwards the optional signing/notarization secrets.
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # Collect every platform's artifacts and publish them to the tag's Release in one shot (a single
  # publish job avoids the race of multiple build jobs writing the same Release).
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Job-level permissions fully override the workflow-level block, so contents:write is restated
    # alongside the two scopes the SLSA attestation needs: id-token to sign via Sigstore OIDC, and
    # attestations to write the provenance record.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true # flatten every platform's files into one directory

      # One SHA256SUMS.txt covering all installers so users can verify downloads.
      - name: Generate checksums
        working-directory: artifacts
        run: |
          shopt -s nullglob
          files=(*.dmg *.zip *.exe *.AppImage *.deb)
          if [ ${#files[@]} -gt 0 ]; then
            sha256sum "${files[@]}" > SHA256SUMS.txt
            cat SHA256SUMS.txt
          fi

      # Sign a SLSA build-provenance attestation for the exact installer bytes about to be published,
      # so users can prove each download was built by this workflow from this commit (verify with
      # `gh attestation verify <file> --repo <owner>/<repo>`). SHA256SUMS.txt is excluded — it's a
      # digest list, not a build product. The attestation lives in the repo's Attestations, not as a
      # Release asset, so it doesn't clutter the download list.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb

      # Attach user-facing artifacts + checksums: installers (dmg/exe/AppImage/deb) and portable
      # zips (mac + win), plus the win/linux electron-updater feed files (latest.yml, latest-linux.yml)
      # and blockmaps so the mirror-to-website job can republish them to the CDN feed. macOS latest-mac*
      # .yml is still excluded: arm64/x64 build on separate runners and each emits its own (they'd
      # collide), and Squirrel.Mac can't auto-update the unsigned mac build anyway (no Developer ID).
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/SHA256SUMS.txt
            artifacts/latest.yml
            artifacts/latest-linux.yml
            artifacts/*.blockmap
