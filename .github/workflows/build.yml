name: Build

# Reusable build workflow: packages the app for macOS (arm64 + x64) and Linux, each on its own
# native runner, and uploads the installers as pipeline artifacts. Called by release.yml (stable,
# on tag) and nightly.yml (rolling prerelease, on push to main) so the build matrix lives in one
# place. Publishing is done by the caller, not here.
#
# `npm ci` on each runner installs the native binaries it needs (claude-agent-sdk optional package,
# Prisma query engine). Both macOS archs build on Apple Silicon (macos-14) — x64 is cross-packaged and
# its Prisma engine comes from binaryTargets, pruned per-arch below; Linux on ubuntu-latest; Windows
# x64 on windows-latest.
on:
  workflow_call:
    inputs:
      nightly:
        description: >-
          Mark artifacts as a nightly build: appends `-nightly.<short-sha>` to the version so
          nightly installers get distinct filenames (and in-app version) from stable releases.
        type: boolean
        default: false
      mac_only:
        description: >-
          Build only the two macOS archs (skip Linux + Windows). Used by the notarization dry-run,
          which only needs a signed mac build; release/nightly leave it false for the full matrix.
        type: boolean
        default: false
      skip_verify:
        description: >-
          Skip the lint/typecheck/test job. Used by the notarization dry-run to test signing +
          notarization in isolation; release/nightly leave it false so builds stay gated on tests.
        type: boolean
        default: false

jobs:
  # Gate every packaged build on the quality suite so nightly (push to main) and release (tag) can
  # never publish installers that were never tested. Runs once on Apple Silicon to match the
  # release/verification environment (see pr-check.yml for why macOS). The build matrix `needs` this.
  verify:
    name: Verify (lint + typecheck + test)
    # Skipped by the notarization dry-run (skip_verify), which only needs a signed mac build.
    if: ${{ !inputs.skip_verify }}
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

  # Resolve the platform matrix. mac_only trims it to the two mac archs — used by the notarization
  # dry-run (notarize-dryrun.yml), which only needs a signed mac build. With mac_only false (the
  # release.yml / nightly.yml callers) the full matrix is emitted, so their behavior is unchanged.
  setup:
    name: Resolve platform matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          # Both mac archs build on Apple Silicon (macos-14). x64 is cross-packaged — electron pulls
          # the x64 runtime and the only per-arch native artifact we ship (the Prisma query engine)
          # comes from the schema's binaryTargets, pruned per-arch in the build job. This avoids the
          # scarce Intel macos-13 runner. Windows' engine is query_engine-windows.dll.node (no `lib`
          # prefix, .dll.node not .so/.dylib). engine_keep = substring of the engine file to keep.
          # subdir/bin_os/bin_arch drive the notebook runtime staging step: `subdir` is the conda
          # platform whose micromamba + offline bundle to fetch, and bin_os/bin_arch are the
          # resources/bin/<os>/<arch> path electron-builder.yml reads the micromamba binary from.
          mac='[
            {"name":"macos-arm64","os":"macos-14","platform":"mac","eb_args":"--mac --arm64","engine_keep":"darwin-arm64","subdir":"osx-arm64","bin_os":"mac","bin_arch":"arm64"},
            {"name":"macos-x64","os":"macos-14","platform":"mac","eb_args":"--mac --x64","engine_keep":"darwin.dylib","subdir":"osx-64","bin_os":"mac","bin_arch":"x64"}
          ]'
          rest='[
            {"name":"linux-x64","os":"ubuntu-latest","platform":"linux","eb_args":"--linux","engine_keep":".so.node","subdir":"linux-64","bin_os":"linux","bin_arch":"x64"},
            {"name":"windows-x64","os":"windows-latest","platform":"win","eb_args":"--win --x64","engine_keep":"windows.dll","subdir":"win-64","bin_os":"win","bin_arch":"x64"}
          ]'
          if [ "${{ inputs.mac_only }}" = "true" ]; then
            include=$(jq -c '.' <<<"$mac")
          else
            include=$(jq -c '. + $rest' --argjson rest "$rest" <<<"$mac")
          fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: [verify, setup]
    # Run once the matrix is resolved. Tolerate a skipped verify (skip_verify dry-run) but still
    # block on a real verify failure — matching the fail-closed behavior when verify runs.
    if: ${{ always() && needs.setup.result == 'success' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one platform's failure cancel the others.
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # npm ci runs postinstall: prisma generate + electron-builder install-app-deps.
      - name: Install dependencies
        run: npm ci

      # Installers do not carry a managed-runtime bundle. Stable/nightly builds therefore fail closed
      # unless the exact immutable manifest required by this app version and platform is already live
      # on the official CDN. The notarization dry-run skips this release-readiness gate.
      - name: Verify managed runtime bundle is published
        if: ${{ !inputs.skip_verify }}
        env:
          OPEN_SCIENCE_ENV_CDN_BASE: https://statics.aipoch.com/open-science
        run: node scripts/verify-runtime-bundle.mjs "${{ matrix.subdir }}"

      # The schema's binaryTargets generates Prisma engines for several platforms; keep only the one
      # this build ships so each installer stays lean. Fails loudly if the expected engine is missing.
      # The glob is `*query_engine-*` (not `libquery_engine-*`) so it also matches Windows' engine,
      # which is named `query_engine-windows.dll.node` without the `lib` prefix.
      - name: Prune foreign Prisma engines
        shell: bash
        run: |
          keep='${{ matrix.engine_keep }}'
          found=0
          for f in node_modules/.prisma/client/*query_engine-*; do
            [ -e "$f" ] || continue
            case "$f" in
              *"$keep"*) found=1 ;;
              *) echo "pruning $(basename "$f")"; rm -f "$f" ;;
            esac
          done
          echo "remaining engines:"; ls -1 node_modules/.prisma/client/*query_engine-* 2>/dev/null || true
          [ "$found" = 1 ] || { echo "::error::no Prisma engine matching '$keep' was generated"; exit 1; }

      # Stage the notebook runtime resources electron-builder.yml ships as extraResources, BEFORE the
      # package+sign step so the mach-O micromamba is signed/notarized along with the app: the
      # micromamba binary -> resources/bin/<os>/<arch>/ (REQUIRED — electron-builder's extraResources
      # `from` would fail without it; fetched from the public micro.mamba.pm).
      #
      # NOTE: the installer does not bake in the runtime packs. Default envs are fetched on demand
      # from the immutable runtime bundle published by stage-runtime-bundle.yml; a developer can
      # still provide OPEN_SCIENCE_ENV_BUNDLE_DIR for a dropped-in local pack.
      - name: Stage notebook runtime resources
        shell: bash
        run: |
          name=micromamba
          [ "${{ matrix.subdir }}" = "win-64" ] && name=micromamba.exe
          # Pass the pinned version explicitly so the intent is visible in CI. Read it from the single
          # source of truth (scripts/micromamba-versions.json) to avoid drifting from the digests the
          # script verifies against.
          export MICROMAMBA_VERSION=$(node -p "require('./scripts/micromamba-versions.json').version")
          echo "using pinned micromamba $MICROMAMBA_VERSION"
          node scripts/fetch-micromamba.mjs "${{ matrix.subdir }}" \
            "resources/bin/${{ matrix.bin_os }}/${{ matrix.bin_arch }}/$name"

      # Build the renderer + main (incl. typecheck), then package with electron-builder.
      #
      # macOS signing: this step only SIGNS (Developer ID), it never notarizes. Notarization +
      # stapling is decoupled into notarize-mac.yml so the build never blocks on Apple's servers
      # (see that workflow and release.yml). electron-builder auto-imports CSC_LINK (base64 .p12)
      # to sign a stable build; with no cert — or for any nightly (kept ad-hoc for speed) — signing
      # is skipped and the afterPack hook (build/adhoc-sign.cjs) applies a valid ad-hoc signature so
      # Gatekeeper shows the bypassable "unidentified developer" prompt instead of "damaged". Linux
      # has no signing concept. All secrets are optional — the build works with none set.
      - name: Build & package
        shell: bash
        env:
          # macOS Developer ID (real signing when present, ad-hoc fallback otherwise)
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          npm run build
          # Nightly: override the packaged version with `<base>-nightly.<short-sha>` (valid semver
          # prerelease). Every artifactName template uses ${version}, so this alone makes nightly
          # filenames distinct from stable ones and ties each build to its commit.
          eb_ver=()
          if [ "${{ inputs.nightly }}" = "true" ]; then
            base=$(node -p "require('./package.json').version")
            eb_ver=(-c.extraMetadata.version="${base}-nightly.${GITHUB_SHA::7}")
          fi
          if [ "${{ matrix.platform }}" = "mac" ] && [ "${{ inputs.nightly }}" != "true" ] && [ -n "$CSC_LINK" ]; then
            # Stable build with a Developer ID cert -> SIGN ONLY (notarize:false). Notarization +
            # stapling happens later in notarize-mac.yml, so this job never waits on Apple.
            #
            # Update channel stays the default `latest`, so `channel: latest` is baked into
            # app-update.yml and the mac updater polls the standard `latest-mac.yml`. arm64 and x64
            # build on separate runners; each emits its own `latest-mac.yml` listing only its arch,
            # which the publish job merges into a single `latest-mac.yml` carrying both arch zips
            # (electron-updater's MacUpdater picks the right one by arch at download time). This avoids
            # the per-arch `${arch}-mac.yml` scheme, which shipped an app-update.yml the mac updater
            # never matched against the published feed names.
            npx electron-builder ${{ matrix.eb_args }} "${eb_ver[@]}" --publish never \
              -c.mac.notarize=false
          else
            # No cert, or a nightly build (ad-hoc on purpose): skip electron-builder's own signing.
            # GitHub injects unset secrets as EMPTY strings, and electron-builder mis-reads an empty
            # CSC_LINK as a certificate path — it resolves to the cwd and dies with
            # "<repo path> not a file". Drop the empty vars and disable auto-discovery so it skips
            # signing entirely; the afterPack hook (build/adhoc-sign.cjs) ad-hoc signs instead.
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder ${{ matrix.eb_args }} "${eb_ver[@]}" --publish never
          fi

      # Upload only the distributables + electron-updater metadata for the caller's publish job.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          retention-days: 1
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
            dist/*-mac.yml
          if-no-files-found: error
