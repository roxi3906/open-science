name: Build

# Reusable build workflow: packages the app for macOS (arm64 + x64) and Linux, each on its own
# native runner, and uploads the installers as pipeline artifacts. Called by release.yml (stable,
# on tag) and nightly.yml (rolling prerelease, on push to main) so the build matrix lives in one
# place. Publishing is done by the caller, not here.
#
# `npm ci` on each runner installs the native binaries it needs (claude-agent-sdk optional package,
# Prisma query engine). Both macOS archs build on Apple Silicon (macos-14) — x64 is cross-packaged and
# its Prisma engine comes from binaryTargets, pruned per-arch below; Linux on ubuntu-latest; Windows
# x64 on windows-latest.
on:
  workflow_call:
    inputs:
      nightly:
        description: >-
          Mark artifacts as a nightly build: appends `-nightly.<short-sha>` to the version so
          nightly installers get distinct filenames (and in-app version) from stable releases.
        type: boolean
        default: false

jobs:
  # Gate every packaged build on the quality suite so nightly (push to main) and release (tag) can
  # never publish installers that were never tested. Runs once on Apple Silicon to match the
  # release/verification environment (see pr-check.yml for why macOS). The build matrix `needs` this.
  verify:
    name: Verify (lint + typecheck + test)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one platform's failure cancel the others.
      fail-fast: false
      matrix:
        include:
          # Both mac archs build on Apple Silicon (macos-14). x64 is cross-packaged here — electron
          # downloads the x64 runtime, and the only per-arch native artifact we ship (the Prisma
          # query engine) is provided by the schema's binaryTargets, then pruned below. This avoids
          # the scarce Intel `macos-13` runner (long queues). engine_keep = substring of the Prisma
          # engine filename to keep for this build.
          - name: macos-arm64
            os: macos-14
            platform: mac
            eb_args: --mac --arm64
            engine_keep: darwin-arm64
          - name: macos-x64
            os: macos-14
            platform: mac
            eb_args: --mac --x64
            engine_keep: darwin.dylib
          - name: linux-x64
            os: ubuntu-latest
            platform: linux
            eb_args: --linux
            engine_keep: .so.node
          - name: windows-x64
            os: windows-latest
            platform: win
            eb_args: --win --x64
            # Windows' native engine is `query_engine-windows.dll.node` (note: no `lib` prefix, and
            # `.dll.node` rather than `.so/.dylib`), which the broadened prune glob below matches.
            engine_keep: windows.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # npm ci runs postinstall: prisma generate + electron-builder install-app-deps.
      - name: Install dependencies
        run: npm ci

      # The schema's binaryTargets generates Prisma engines for several platforms; keep only the one
      # this build ships so each installer stays lean. Fails loudly if the expected engine is missing.
      # The glob is `*query_engine-*` (not `libquery_engine-*`) so it also matches Windows' engine,
      # which is named `query_engine-windows.dll.node` without the `lib` prefix.
      - name: Prune foreign Prisma engines
        shell: bash
        run: |
          keep='${{ matrix.engine_keep }}'
          found=0
          for f in node_modules/.prisma/client/*query_engine-*; do
            [ -e "$f" ] || continue
            case "$f" in
              *"$keep"*) found=1 ;;
              *) echo "pruning $(basename "$f")"; rm -f "$f" ;;
            esac
          done
          echo "remaining engines:"; ls -1 node_modules/.prisma/client/*query_engine-* 2>/dev/null || true
          [ "$found" = 1 ] || { echo "::error::no Prisma engine matching '$keep' was generated"; exit 1; }

      # Build the renderer + main (incl. typecheck), then package with electron-builder.
      #
      # macOS signing: this step only SIGNS (Developer ID), it never notarizes. Notarization +
      # stapling is decoupled into notarize-mac.yml so the build never blocks on Apple's servers
      # (see that workflow and release.yml). electron-builder auto-imports CSC_LINK (base64 .p12)
      # to sign a stable build; with no cert — or for any nightly (kept ad-hoc for speed) — signing
      # is skipped and the afterPack hook (build/adhoc-sign.cjs) applies a valid ad-hoc signature so
      # Gatekeeper shows the bypassable "unidentified developer" prompt instead of "damaged". Linux
      # has no signing concept. All secrets are optional — the build works with none set.
      - name: Build & package
        shell: bash
        env:
          # macOS Developer ID (real signing when present, ad-hoc fallback otherwise)
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          npm run build
          # Nightly: override the packaged version with `<base>-nightly.<short-sha>` (valid semver
          # prerelease). Every artifactName template uses ${version}, so this alone makes nightly
          # filenames distinct from stable ones and ties each build to its commit.
          eb_ver=()
          if [ "${{ inputs.nightly }}" = "true" ]; then
            base=$(node -p "require('./package.json').version")
            eb_ver=(-c.extraMetadata.version="${base}-nightly.${GITHUB_SHA::7}")
          fi
          if [ "${{ matrix.platform }}" = "mac" ] && [ "${{ inputs.nightly }}" != "true" ] && [ -n "$CSC_LINK" ]; then
            # Stable build with a Developer ID cert -> SIGN ONLY (notarize:false). Notarization +
            # stapling happens later in notarize-mac.yml, so this job never waits on Apple.
            npx electron-builder ${{ matrix.eb_args }} "${eb_ver[@]}" --publish never -c.mac.notarize=false
          else
            # No cert, or a nightly build (ad-hoc on purpose): skip electron-builder's own signing.
            # GitHub injects unset secrets as EMPTY strings, and electron-builder mis-reads an empty
            # CSC_LINK as a certificate path — it resolves to the cwd and dies with
            # "<repo path> not a file". Drop the empty vars and disable auto-discovery so it skips
            # signing entirely; the afterPack hook (build/adhoc-sign.cjs) ad-hoc signs instead.
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder ${{ matrix.eb_args }} "${eb_ver[@]}" --publish never
          fi

      # Upload only the distributables + electron-updater metadata for the caller's publish job.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          retention-days: 1
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error
