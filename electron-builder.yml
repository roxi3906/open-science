appId: com.aipoch.open-science
productName: Open Science
copyright: Copyright © 2026 AIPOCH
directories:
  buildResources: build
# Apply a valid deep ad-hoc signature on macOS (no Developer ID available). Without this,
# electron-builder ships an incompletely-signed bundle that Gatekeeper flags as "damaged"
# on downloaded/quarantined copies, so the app won't launch on other machines. See the hook.
afterPack: build/adhoc-sign.cjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # Prisma is shipped via extraResources (see below), not inside the asar. Exclude it here so that at
  # runtime `require('@prisma/client')` resolves the real copy in Contents/Resources/node_modules
  # (app.asar's parent dir) instead of a broken in-asar copy that can't find its generated `.prisma`
  # client — which otherwise crashes the main process at startup with
  # "Cannot find module '.prisma/client/default'" (window never opens; dock icon bounces and quits).
  - '!node_modules/@prisma/client{,/**/*}'
  - '!node_modules/.prisma{,/**/*}'
  # The bundled Claude native binary (~220MB) is never executed: the app spawns the ACP agent with
  # CLAUDE_CODE_EXECUTABLE pointing at the user's system-installed claude, and claude-agent-acp only
  # resolves this optional platform package when that env var is unset. Excluding it drops ~220MB.
  # Wildcard every platform variant (darwin-arm64/-x64, linux-*, win32-*) so the exclusion holds no
  # matter which OS the release job builds on — npm only installs the one matching the build host.
  - '!node_modules/@anthropic-ai/claude-agent-sdk-*{,/**/*}'
asarUnpack:
  - resources/**
  # The ACP agent runs as a spawned child process, so its entry must live outside the asar.
  - node_modules/@agentclientprotocol/claude-agent-acp/**
# The Prisma generated client (`node_modules/.prisma`) is produced by `prisma generate` and is NOT a
# declared dependency, so electron-builder's node_modules collector never bundles it into the asar.
# It also loads a native query engine (.dylib.node) by path, which can't run from inside an asar. Ship
# the client + generated code as plain files under Contents/Resources/node_modules; Node's normal
# directory walk from app.asar finds them there. (@prisma/client v6 has zero runtime deps, so the
# client + .prisma pair is self-contained.)
extraResources:
  - from: node_modules/.prisma
    to: node_modules/.prisma
  - from: node_modules/@prisma/client
    to: node_modules/@prisma/client
# Windows packaging is on hold — to be added later. To enable: uncomment win/nsis below, add a
# windows job to .github/workflows/release.yml, and restore the "build:win" script in package.json.
# win:
#   executableName: open-science
#   artifactName: ${name}-${version}-win-${arch}.${ext}
# nsis:
#   artifactName: ${name}-${version}-win-${arch}-setup.${ext}
#   shortcutName: ${productName}
#   uninstallDisplayName: ${productName}
#   createDesktopShortcut: always
mac:
  artifactName: ${name}-${version}-mac-${arch}.${ext}
  # Minimum macOS to run the app (written to Info.plist LSMinimumSystemVersion). macOS 12 (Monterey)
  # and up; below this the OS refuses to launch. Independent of the CI build runner's macOS version.
  minimumSystemVersion: '12.0.0'
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    CFBundleName: Open Science
    CFBundleDisplayName: Open Science
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}-mac-${arch}.${ext}
linux:
  # snap is intentionally omitted: building it on a stock GitHub runner needs snapcraft + LXD and
  # is flaky in CI. AppImage (portable, runs anywhere) + deb (Debian/Ubuntu) cover the common cases.
  target:
    - AppImage
    - deb
  maintainer: aipoch
  category: Utility
appImage:
  artifactName: ${name}-${version}-linux-${arch}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: aipoch
  repo: open-science
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
